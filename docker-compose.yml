services:
  oracle-vm-creator:
    build: .
    container_name: oracle-vm-creator
    restart: unless-stopped
    ports:
      - "172.17.0.1:3002:8000"
    volumes:
      - ./data:/data
    environment:
      # список токенов через запятую; первый — «владелец» данных старой раскладки
      - ACCESS_TOKENS=${ACCESS_TOKENS:-}
      - ACCESS_TOKEN=${ACCESS_TOKEN:-}
      # общий логин/пароль: вход выдаёт персональный токен-ссылку
      - APP_LOGIN=${APP_LOGIN:-}
      - APP_PASSWORD=${APP_PASSWORD:-}
